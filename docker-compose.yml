# ── TrackTrack – Docker Compose ───────────────────────────────────────────────
#
# Portainer usage (recommended):
#   Stacks → Add stack → Repository
#   Repository URL: https://github.com/theshield2594/tracktrack
#   Compose path:   docker-compose.yml
#   The image is pre-built via GitHub Actions — no build step needed.
#
# Local dev (builds from source):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#   (or uncomment the `build:` block below and comment out `image:`)
# ─────────────────────────────────────────────────────────────────────────────

services:
  tracktrack:
    image: ghcr.io/theshield2594/tracktrack:latest
    # build:                    # ← uncomment for local source builds
    #   context: .
    #   dockerfile: Dockerfile
    container_name: tracktrack
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # SQLite database — data survives image rebuilds
      - tracktrack-data:/app/data
    environment:
      NODE_ENV: production
      # Override the port the Next.js server listens on (must match EXPOSE)
      PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      # Portainer labels (optional — helps UI grouping)
      - "com.docker.compose.project=tracktrack"
      - "traefik.enable=false"         # set true if you front with Traefik

volumes:
  tracktrack-data:
    driver: local
    # To bind-mount a host path instead (e.g. for easy backups):
    #   driver: local
    #   driver_opts:
    #     type: none
    #     o: bind
    #     device: /opt/tracktrack/data
