<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Inner glow ring -->
  <rect x="12" y="12" width="488" height="488" rx="104" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Lightning bolt -->
  <path
    d="M304 64L176 280h112l-80 168 192-240H288z"
    fill="url(#bolt)"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Small track lines (subscription track motif) -->
  <rect x="72" y="344" width="60" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="72" y="360" width="40" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="72" y="376" width="50" height="8" rx="4" fill="rgba(255,255,255,0.20)"/>
</svg>
